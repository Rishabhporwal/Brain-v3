packages:
  # ① Product Applications
  - "apps/web-*"
  - "apps/packages/*"
  # ② Platform services (NestJS)
  - "platform/*"
  # ③ Data-platform services (NestJS) — connectors land per provider
  - "data-platform/connector-platform/registry"
  - "data-platform/connector-platform/_kit/*"
  - "data-platform/connector-platform/connectors/*"
  - "data-platform/raw-archiver"
  # ④ Intelligence & agent platforms — live services only.
  #    Planned services live in tools/service-catalog/; when one is scaffolded, add it here
  #    (customer-intelligence/*, agent-platform/*, data-platform/first-party-data/*, apps/mobile, sdk/*).
  - "commerce-intelligence/metric-engine"
  # ⑤ Shared TS libraries + contracts
  - "shared/ts/*"
  - "contracts"
# Python workspaces (ai-platform, shared/python/*) are managed by uv — see pyproject.toml
