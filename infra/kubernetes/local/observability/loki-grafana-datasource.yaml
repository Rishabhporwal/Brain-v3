# M5 — register Loki as a Grafana datasource. The kube-prometheus-stack Grafana runs a sidecar that
# auto-loads any ConfigMap labelled `grafana_datasource: "1"`, so this is the declarative (GitOps-safe)
# way to wire logs into the same Grafana that already serves Prometheus metrics — no manual UI step.
apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-grafana-datasource
  namespace: monitoring
  labels:
    grafana_datasource: '1'
data:
  loki-datasource.yaml: |
    apiVersion: 1
    datasources:
      - name: Loki
        type: loki
        access: proxy
        url: http://loki.monitoring.svc.cluster.local:3100
        isDefault: false
        jsonData:
          maxLines: 1000
