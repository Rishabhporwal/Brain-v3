# Local EKS-parity cluster (Kubernetes-in-Docker). 1 control-plane + 2 workers ≈ a managed node group.
# ingress-nginx binds node :80/:443; mapped to host :8081/:8444 to avoid clashing with the compose stack.
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: brain-local
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      - { containerPort: 80, hostPort: 8081, protocol: TCP }
      - { containerPort: 443, hostPort: 8444, protocol: TCP }
  - role: worker
  - role: worker
