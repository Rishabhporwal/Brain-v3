# M4 — sync the LocalStack Secrets Manager secret (brain/staging/app) into a K8s Secret via ESO.
# In real AWS this same shape syncs from the real Secrets Manager — only the endpoint env on the
# controller and the IRSA auth differ. Static test/test creds here stand in for IRSA.
---
apiVersion: v1
kind: Secret
metadata:
  name: localstack-creds
  namespace: brain
type: Opaque
stringData:
  access-key-id: test
  secret-access-key: test
---
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: aws-localstack
  namespace: brain
spec:
  provider:
    aws:
      service: SecretsManager
      region: ap-south-1
      auth:
        secretRef:
          accessKeyIDSecretRef:
            name: localstack-creds
            key: access-key-id
          secretAccessKeySecretRef:
            name: localstack-creds
            key: secret-access-key
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: brain-app-secrets
  namespace: brain
spec:
  refreshInterval: 1m
  secretStoreRef:
    name: aws-localstack
    kind: SecretStore
  target:
    name: brain-app-secrets      # the K8s Secret ESO materializes
    creationPolicy: Owner
  data:
    - secretKey: PG_URL
      remoteRef:
        key: brain/staging/app
        property: PG_URL
    - secretKey: VAULT_KEY
      remoteRef:
        key: brain/staging/app
        property: VAULT_KEY
