# M3b — analytical + streaming + cache layer for the kind parity stack (namespace: brain).
# ClickHouse (OLAP, with the brain_current_brand row-policy setting) + Redpanda (Kafka/MSK stand-in) + Redis.
# In-cluster DSNs: http://clickhouse:8123 , redpanda:9092 , redis:6379
---
# ── ClickHouse custom setting so row policies can read getSetting('brain_current_brand') ──
apiVersion: v1
kind: ConfigMap
metadata:
  name: clickhouse-brain-config
  namespace: brain
data:
  brain.xml: |
    <clickhouse>
      <!-- allow arbitrary settings prefixed brain_ → enables SET brain_current_brand / getSetting() -->
      <custom_settings_prefixes>brain_</custom_settings_prefixes>
    </clickhouse>
---
apiVersion: v1
kind: Service
metadata:
  name: clickhouse
  namespace: brain
  labels: { app: clickhouse }
spec:
  selector: { app: clickhouse }
  ports:
    - { name: http, port: 8123, targetPort: 8123 }
    - { name: native, port: 9000, targetPort: 9000 }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: clickhouse
  namespace: brain
  labels: { app: clickhouse }
spec:
  replicas: 1
  selector:
    matchLabels: { app: clickhouse }
  template:
    metadata:
      labels: { app: clickhouse }
    spec:
      containers:
        - name: clickhouse
          image: clickhouse/clickhouse-server:24-alpine
          ports:
            - { containerPort: 8123 }
            - { containerPort: 9000 }
          readinessProbe:
            httpGet: { path: /ping, port: 8123 }
            initialDelaySeconds: 10
            periodSeconds: 5
          volumeMounts:
            - { name: cfg, mountPath: /etc/clickhouse-server/config.d/brain.xml, subPath: brain.xml, readOnly: true }
            - { name: data, mountPath: /var/lib/clickhouse }
      volumes:
        - name: cfg
          configMap: { name: clickhouse-brain-config }
        - name: data
          emptyDir: {}
---
# ── Redpanda (single-node dev; Kafka API on :9092) ──
apiVersion: v1
kind: Service
metadata:
  name: redpanda
  namespace: brain
  labels: { app: redpanda }
spec:
  selector: { app: redpanda }
  ports:
    - { name: kafka, port: 9092, targetPort: 9092 }
    - { name: admin, port: 9644, targetPort: 9644 }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redpanda
  namespace: brain
  labels: { app: redpanda }
spec:
  replicas: 1
  selector:
    matchLabels: { app: redpanda }
  template:
    metadata:
      labels: { app: redpanda }
    spec:
      containers:
        - name: redpanda
          image: redpandadata/redpanda:v24.2.7
          args:
            - redpanda
            - start
            - --smp=1
            - --memory=1G
            - --reserve-memory=0M
            - --overprovisioned
            - --node-id=0
            - --check=false
            - --kafka-addr=PLAINTEXT://0.0.0.0:9092
            - --advertise-kafka-addr=PLAINTEXT://redpanda:9092
          ports:
            - { containerPort: 9092 }
            - { containerPort: 9644 }
          readinessProbe:
            httpGet: { path: /v1/status/ready, port: 9644 }
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 30
---
# ── Redis (ElastiCache stand-in) ──
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: brain
  labels: { app: redis }
spec:
  selector: { app: redis }
  ports:
    - { name: redis, port: 6379, targetPort: 6379 }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: brain
  labels: { app: redis }
spec:
  replicas: 1
  selector:
    matchLabels: { app: redis }
  template:
    metadata:
      labels: { app: redis }
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - { containerPort: 6379 }
          readinessProbe:
            exec: { command: ['redis-cli', 'ping'] }
            initialDelaySeconds: 3
            periodSeconds: 5
