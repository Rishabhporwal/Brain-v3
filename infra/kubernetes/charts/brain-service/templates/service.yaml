apiVersion: v1
kind: Service
metadata:
  name: {{ include "brain-service.name" . }}
  labels: {{- include "brain-service.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector: {{- include "brain-service.selector" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.port }}
      targetPort: {{ .Values.port }}
{{- if .Values.serviceAccount.create }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "brain-service.name" . }}
  labels: {{- include "brain-service.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations: {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
