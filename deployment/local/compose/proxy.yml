# Full stack behind a single origin (http://localhost:8088). Run with `make proxy`.
# Keycloak is reconfigured (relative path /auth + pinned hostname) so the token issuer is consistent
# for the browser AND the web container; the container reaches Keycloak's backchannel internally.
name: brain-local
services:
  caddy:
    image: caddy:2-alpine
    container_name: brain-local-caddy
    depends_on: [keycloak]
    ports:
      - '8088:8088'
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro

  keycloak:
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HTTP_RELATIVE_PATH: /idp
      KC_HOSTNAME: http://localhost:8088/idp
      KC_HOSTNAME_STRICT: 'false'
      KC_HOSTNAME_BACKCHANNEL_DYNAMIC: 'true'

  bff:
    image: brain-bff:local
    build:
      context: ../..
      dockerfile: platform/api-gateway-bff/Dockerfile
    container_name: brain-local-bff
    depends_on: [postgres, clickhouse, keycloak]
    environment:
      PG_URL: postgres://brain:brain@postgres:5432/brain
      CH_URL: http://clickhouse:8123
      KEYCLOAK_ISSUER: http://localhost:8088/idp/realms/brain
      KEYCLOAK_JWKS_URL: http://keycloak:8080/idp/realms/brain/protocol/openid-connect/certs
      # Shopify OAuth: unset creds → dev-stub connect. For the real flow set SHOPIFY_CLIENT_ID/SECRET and
      # add SHOPIFY_REDIRECT_URI to the app's allowed redirects. See api-gateway-bff/.env.example.
      WEB_BASE: http://localhost:8088
      SHOPIFY_REDIRECT_URI: http://localhost:8088/api/integrations/shopify/callback
      # Integration data backbone: integration.connected + (future) webhook ingest events → Redpanda.
      # Onboarding lifecycle does NOT go here. Remove to no-op.
      KAFKA_BROKERS: redpanda:9092

  web:
    image: brain-web:proxy
    build:
      context: ../..
      dockerfile: apps/web-founder-console/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:8088/bff
        NEXT_PUBLIC_APP_URL: http://localhost:8088
    container_name: brain-local-web
    depends_on: [keycloak]
    environment:
      AUTH_SECRET: brain-local-dev-auth-secret-please-change-32
      AUTH_URL: http://localhost:8088
      KEYCLOAK_ISSUER: http://localhost:8088/idp/realms/brain
      KEYCLOAK_INTERNAL_ISSUER: http://keycloak:8080/idp/realms/brain
      KEYCLOAK_CLIENT_ID: brain-web
      KEYCLOAK_CLIENT_SECRET: brain-web-secret
