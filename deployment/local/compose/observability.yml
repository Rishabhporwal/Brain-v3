# Local observability overlay — Prometheus + Grafana scraping the BFF's /metrics.
# Run alongside the proxy stack, e.g.:
#   docker compose -f docker-compose.yml -f compose/infra.yml -f compose/proxy.yml -f compose/observability.yml up -d
# Prometheus UI: http://localhost:9090  ·  Grafana: http://localhost:3001 (anonymous admin)
name: brain-local
services:
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: brain-local-prometheus
    command: ['--config.file=/etc/prometheus/prometheus.yml', '--storage.tsdb.retention.time=7d']
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - '9090:9090'

  grafana:
    image: grafana/grafana:11.2.0
    container_name: brain-local-grafana
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: 'true'
      GF_AUTH_ANONYMOUS_ORG_ROLE: 'Admin'
      GF_SECURITY_ADMIN_PASSWORD: brain
      GF_USERS_DEFAULT_THEME: light
    volumes:
      - ./observability/grafana-datasource.yml:/etc/grafana/provisioning/datasources/ds.yml:ro
    ports:
      - '3001:3000'
    depends_on:
      - prometheus
