# Local Prometheus — scrapes the BFF's /metrics. Add a job per service as more expose /metrics.
global:
  scrape_interval: 15s
  scrape_timeout: 10s

scrape_configs:
  - job_name: api-gateway-bff
    metrics_path: /metrics
    static_configs:
      - targets: ['bff:4000']
        labels:
          service: api-gateway-bff
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']
